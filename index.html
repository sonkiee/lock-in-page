<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lock-in – Daily Quotes</title>

    <style>
      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial,
          sans-serif;
        background: #0f0f10;
        color: #ffffff;
        display: flex;
        justify-content: center;
      }

      .container {
        max-width: 900px;
        padding: 60px 24px;
        text-align: center;
      }

      .badge {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 999px;
        background: #1f1f22;
        font-size: 12px;
        color: #aaa;
        margin-bottom: 20px;
      }

      h1 {
        font-size: 48px;
        margin: 10px 0;
        letter-spacing: -1px;
      }

      .subtitle {
        font-size: 18px;
        color: #b5b5b5;
        max-width: 600px;
        margin: 0 auto 30px;
        line-height: 1.6;
      }

      .cta {
        display: inline-block;
        padding: 14px 26px;
        border-radius: 12px;
        background: #ffffff;
        color: #000;
        font-weight: 600;
        text-decoration: none;
        margin-top: 10px;
        transition: 0.2s;
      }

      .cta:hover {
        transform: scale(1.03);
      }

      .section {
        margin-top: 80px;
        text-align: left;
      }

      .features {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        margin-top: 20px;
      }

      .card {
        background: #1a1a1d;
        padding: 20px;
        border-radius: 16px;
      }

      .card h3 {
        margin: 0 0 10px;
        font-size: 16px;
      }

      .card p {
        margin: 0;
        color: #aaa;
        font-size: 14px;
        line-height: 1.5;
      }

      .footer {
        margin-top: 80px;
        font-size: 12px;
        color: #666;
      }

      .footer a {
        color: #888;
        text-decoration: none;
        margin: 0 8px;
      }

      .footer a:hover {
        color: #fff;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="badge">Daily Motivation App</div>

      <h1>Lock-in</h1>

      <p class="subtitle">
        Daily quotes designed to keep you focused, disciplined, and mentally
        locked in. One message a day. No noise. Just clarity.
      </p>

      <a class="cta" href="https://your-play-store-link.com">
        Download on Play Store
      </a>

      <div class="footer">
        <div>
          &copy;
          <script>
            document.write(new Date().getFullYear());
          </script>
          Lock-in – Daily Quotes. All rights reserved.
        </div>

        <div style="margin-top: 10px">
          <a href="privacy-policy.html">Privacy Policy</a>
          |
          <a href="terms.html">Terms of Service</a>
        </div>
      </div>
    </div>
  </body>
</html>
